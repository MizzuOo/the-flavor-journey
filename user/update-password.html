<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update New Password</title>
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        body { background: var(--primary-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .update-box { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px; }
        .btn-update { width: 100%; padding: 12px; background: var(--secondary-color); color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="update-box">
    <h2 style="color: var(--primary-color); margin-bottom: 20px;">New Password</h2>
    
    <form id="update-password-form">
        <div class="input-group">
            <label>Enter your new password</label>
            <input type="password" id="new-password" required minlength="6" placeholder="Enter new password">
        </div>
        <button type="submit" class="btn-update">Update Password</button>
    </form>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
document.getElementById("update-password-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const newPassword = document.getElementById("new-password").value;

    // Supabase တွင် Password အသစ်အား အပြီးသတ် ပြောင်းလဲပေးခြင်း
    const { error } = await supabase.auth.updateUser({ password: newPassword });

    if (error) {
        alert("Failed to update password: " + error.message);
    } else {
        alert("Password updated successfully. Please log in again.");
        window.location.href = "login.html"; // အောင်မြင်ရင် login ဆီ ပြန်ပို့မည်
    }
});
</script>

</body>
</html>
