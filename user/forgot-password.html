<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
       
        body {
            background: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .reset-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-top: 5px;
        }
        .btn-reset {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="reset-box">
    <h2 style="color: var(--primary-color); margin-bottom: 20px;">Reset Password</h2>
    <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Enter your email address. We'll send you a link to reset your password.</p>
    
    <form id="forgot-password-form">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="reset-email" required placeholder="Enter your email">
        </div>
        <button type="submit" class="btn-reset">Send Reset Link</button>
    </form>
    
    <p style="margin-top: 20px; font-size: 0.9rem;">
        <a href="login.html" style="color: var(--secondary-color);">Back to Login</a>
    </p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
document.getElementById("forgot-password-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("reset-email").value;

    // 💡 window.location.origin အစား သင့်စက်ရဲ့ Live Server URL အမှန်ကို အတင်းထည့်ပေးလိုက်ပါတယ်
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'http://127.0.0.1:5500/user/update-password.html', 
    });

    if (error) {
        alert("An error has occurred: " + error.message);
    } else {
        alert("A password reset link has been sent to your email. Please check your inbox.");
    }
});
</script>

</body>
</html>
