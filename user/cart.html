<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/cart.css">

<style>
.cart-actions p {
    text-align:center;
    color:red;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<nav class="navbar section-content">

    <a href="#" class="nav-logo">
        <h1 class="logo-text">🥗The Flavour Journey</h1>
    </a>

    <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="categories.html" class="nav-link">Categories</a></li>
        <li><a href="menu.html" class="nav-link">Menu</a></li>
        <li><a href="cart.html" class="nav-link">Cart</a></li>
        <li><a href="order-history.html" class="nav-link">My Orders</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li id="auth-item"></li>
        <li><span class="nav-link" id="userDisplay"></span></li>
    </ul>

</nav>
</header>

<main>
<section class="cart-section">

<div class="section-content">

    <h2 class="section-title">Your Cart 🛒</h2>

    <table class="cart-table">
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="cart-body"></tbody>
    </table>

    <h3 id="final-total"></h3>

    <div class="cart-actions">
        <a href="checkout.html">
            <button class="checkout-btn">Proceed to Checkout</button>
        </a>
    </div>

</div>

</section>
</main>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const ok = await checkAuth();
  if (!ok) return;

  await renderNavbarUser();
  await renderCart();
  await updateCartCount();
});
</script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cartservice.js"></script>
<script src="../js/checkout.service.js"></script>
<script src="../js/ui.js"></script>

<script>
/* ================= INIT NAVBAR ================= */
document.addEventListener("DOMContentLoaded", () => {
    renderNavbarUser();
});
</script>
</body>
</html>
