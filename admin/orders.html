<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Orders</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#f4f6f9;
}

.admin-container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#111827;
    color:white;
    padding:20px;
    position:fixed;
    height:100vh;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
    color:#4CAF50;
}

.sidebar a{
    display:block;
    color:white;
    padding:12px;
    margin:5px 0;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#4CAF50;
}

/* MAIN */
.main{
    margin-left:250px;
    flex:1;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
}

th{
    background:#f9f9f9;
}


.order-items-list {
    margin: 0;
    padding-left: 18px;
    font-size: 13px;
    color: #444;
}

.order-items-list li {
    margin-bottom: 3px;
}

.status{
    padding:6px 12px;
    border-radius:20px;
    color:white;
    font-size:12px;
    font-weight:bold;
}

.status.pending{
    background:orange;
}

.status.confirmed{
    background:#2196F3;
}

.status.preparing{
    background:#9C27B0;
}

.status.delivering{
    background:#FF9800;
}

.status.completed{
    background:#4CAF50;
}

.status.cancelled{
    background:#ef4444;
}

.btn{
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    color:white;
    margin:2px;
    font-size:12px;
}

.btn-confirm{
    background:#2196F3;
}

.btn-preparing{
    background:#9C27B0;
}

.btn-delivering{
    background:#FF9800;
}

.btn-complete{
    background:#4CAF50;
}

.btn-cancel{
    background:#ef4444;
}

.btn-view{
    background:#111827;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index: 1000; 
}

.modal img{
    max-width: 80%;      
    max-height: 80vh;    
    object-fit: contain; 
    border-radius: 10px;
    background: whitesmoke;   
    padding: 10px;       
}
</style>

</head>
<body>

<div class="admin-container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🍽 Admin Panel</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="orders.html" class="active">📦 Orders</a>
    <a href="categories.html">📂 Categories</a>
    <a href="subcategories.html">📁 Subcategories</a>
    <a href="products.html">🍔 Products</a>
    <a href="users.html">👤 Users</a>
    <a href="#" onclick="logout(); return false;">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>Orders Management</h1>

<div class="card">
<table>
<thead>
<tr>
    <th>ID</th>
    <th>Customer</th>
    <th>Ordered Items</th>
    <th>Total</th>
    <th>Payment</th>
    <th>Proof</th>
    <th>Status</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>
</table>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    // ✅ ADMIN PROTECTION (အကောင့်စစ်ဆေးရန်)
    const admin = await requireAdmin();
    if (!admin) return; // Admin မဟုတ်ရင် အောက်က ကုဒ်တွေကို ဆက်အလုပ်မလုပ်ပေးဘဲ ပိတ်ပစ်မည်

    loadOrders();

    // REALTIME
    db
      .channel("orders-realtime")
      .on(
        "postgres_changes",
        {
          event: "INSERT",
          schema: "public",
          table: "orders"
        },
        (payload) => {
          alert("🔥 New Order Received!");
          loadOrders();
        }
      )
      .subscribe();
});

/* ================= LOAD ORDERS ================= */
async function loadOrders() {
    // 💡 Supabase Query ထဲမှာ order_items နဲ့ products ဇယားတွေကို တစ်ခါတည်း Join ချိတ်ပြီး ဆွဲထုတ်လိုက်ပါတယ်
    const { data: orders, error } = await db
      .from("orders")
      .select(`
        *,
        address,
        order_items (
          quantity,
          products ( name )
        )
      `)
      .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    const table = document.getElementById("ordersTable");
    table.innerHTML = "";

    orders.forEach(order => {
        let itemsHtml = `<ul class="order-items-list">`;
        if (order.order_items && order.order_items.length > 0) {
            order.order_items.forEach(item => {
                const productName = item.products ? item.products.name : "Unknown Product";
                itemsHtml += `<li>${productName} <b>x ${item.quantity}</b></li>`;
            });
        } else {
            itemsHtml += `<li>-</li>`;
        }
        itemsHtml += `</ul>`;

        table.innerHTML += `
        <tr>
            <td>${order.id}</td>
            <td>
                ${order.customer_name || "-"}
                <br>
                <small>${order.phone || ""}</small>
                <br>
                <small style="color:#555;"><b>Address:</b> ${order.address || "-"}</small>
            </td>

            <!-- 💡 မှာယူထားတဲ့ ပစ္စည်းစာရင်းကို ဒီနေရာမှာ ထည့်သွင်းပြသပါတယ် -->
            <td>${itemsHtml}</td>

            <td>
                ${Number(order.total).toLocaleString()} MMK
            </td>
            <td>
                ${order.payment_method}
            </td>
            <td>
                ${
                    order.payment_proof
                    ?
                    `<button class="btn btn-view" onclick="viewProof('${order.payment_proof}')">View</button>`
                    :
                    "-"
                }
            </td>
            <td>
                <span class="status ${order.status}">
                    ${order.status}
                </span>
            </td>
            <td>
                <button class="btn btn-confirm" onclick="updateStatus('${order.id}','confirmed')">Confirm</button>
                <button class="btn btn-preparing" onclick="updateStatus('${order.id}','preparing')">Preparing</button>
                <button class="btn btn-delivering" onclick="updateStatus('${order.id}','delivering')">Delivering</button>
                <button class="btn btn-complete" onclick="updateStatus('${order.id}','completed')">Complete</button>
                <button class="btn btn-cancel" onclick="updateStatus('${order.id}','cancelled')">Cancel</button>
            </td>
        </tr>
        `;
    });
}

/* ================= UPDATE STATUS ================= */
async function updateStatus(orderId, newStatus) {
    const { data: order } = await db
      .from("orders")
      .select("status")
      .eq("id", orderId)
      .single();

    const current = order.status;
    const allowed = {
        pending: ["confirmed", "cancelled"],
        confirmed: ["preparing", "cancelled"],
        preparing: ["delivering", "cancelled"],
        delivering: ["completed"],
        completed: [],
        cancelled: []
    };

    if (!allowed[current].includes(newStatus)) {
        alert(`Cannot change from ${current} → ${newStatus}`);
        return;
    }

    const { error } = await db
      .from("orders")
      .update({ status: newStatus })
      .eq("id", orderId);

    if (error) {
        alert(error.message);
        return;
    }

    loadOrders();
}

/* ================= VIEW PAYMENT PROOF ================= */
function viewProof(url) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = url;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
