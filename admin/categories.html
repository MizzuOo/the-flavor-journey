<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Categories</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f4f6f9;
}

.admin-container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#111827;
    color:white;
    padding:20px;
    position:fixed;
    top:0;
    left:0;
    height:100vh;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
    color:#4CAF50;
}

.sidebar a{
    display:block;
    color:white;
    padding:12px;
    margin:5px 0;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#4CAF50;
}

/* MAIN */
.main{
    margin-left:250px;
    flex:1;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn-add{
    background:#4CAF50;
    color:white;
}

.btn-delete{
    background:#ef4444;
    color:white;
    width:100%;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.cat-card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.cat-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.cat-card .content{
    padding:15px;
}

.empty{
    text-align:center;
    color:gray;
    padding:40px;
}
</style>
</head>

<body>

<div class="admin-container">

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>🍽 Admin</h2>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="orders.html">📦 Orders</a>
    <a href="categories.html" class="active">📂 Categories</a>
    <a href="subcategories.html">📁 Subcategories</a>
    <a href="products.html">🍔 Products</a>
    <a href="users.html">👤 Users</a>
    <a href="#" onclick="logout(); return false;">🚪 Logout</a>

</div>

<!-- MAIN -->
<div class="main">

    <h1>Categories</h1>

    <!-- ADD -->
    <div class="card">

        <h3>Add Category</h3>

        <input type="text" id="name" placeholder="Category name">

        <input type="text" id="photo" placeholder="Photo URL">

        <button class="btn-add" onclick="addCategory()">
            Add Category
        </button>

    </div>

    <!-- LIST -->
    <div class="grid" id="categoriesGrid"></div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>


<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>

<script>
async function loadCategories() {

  const { data, error } = await db
    .from("categories")
    .select("*");

  if (error) {
    console.error(error);
    return;
  }

  const grid = document.getElementById("categoriesGrid");

  grid.innerHTML = "";

  data.forEach(cat => {

    grid.innerHTML += `
      <div class="cat-card">

        <img src="${cat.photo}" alt="${cat.name}">

        <div class="content">
          <h3>${cat.name}</h3>

          <button class="btn-delete"
            onclick="deleteCategory('${cat.id}')">
            Delete
          </button>
        </div>

      </div>
    `;
  });
}

async function addCategory() {

  const name = document.getElementById("name").value;
  const photo = document.getElementById("photo").value;

  if (!name || !photo) {
    alert("Fill all fields");
    return;
  }

  const { error } = await db
    .from("categories")
    .insert([{
      name,
      photo
    }]);

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  alert("Category added");

  document.getElementById("name").value = "";
  document.getElementById("photo").value = "";

  loadCategories();
}

async function deleteCategory(id) {

  if (!confirm("Delete category?")) return;

  await db
    .from("categories")
    .delete()
    .eq("id", id);

  loadCategories();
}

document.addEventListener("DOMContentLoaded", () => {
  loadCategories();
});

document.addEventListener("DOMContentLoaded", async () => {
  // ✅ ADMIN PROTECTION (အကောင့်စစ်ဆေးရန်)
  const admin = await requireAdmin();
  if (!admin) return;

  loadCategories();
});
</script>

</body>
</html>
