<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Users</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f4f6f9;
}

/* ===== LAYOUT ===== */
.admin-container{
    display:flex;
    min-height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:250px;
    background:#111827;
    color:white;
    padding:20px;
    position:fixed;
    top:0;
    left:0;
    height:100vh;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
    color:#4CAF50;
}

.sidebar a{
    display:block;
    color:white;
    padding:12px;
    margin:5px 0;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#4CAF50;
}

/* ===== MAIN ===== */
.main{
    margin-left:250px; 
    flex:1;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* ===== TABLE ===== */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid #eee;
}

/* FIX ACTION COLUMN */
td:last-child{
    min-width:260px;
    white-space:normal;
}

/* BUTTON GROUP */
.action-buttons{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

/* FIX ACTION COLUMN WIDTH */
td:last-child{
    min-width:320px;
}

/* ===== BADGES ===== */
.badge{
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    color:white;
}

.admin{background:#2563eb;}
.user{background:#4CAF50;}
.blocked{background:#ef4444;}

/* ===== BUTTONS ===== */
.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    margin:2px;
}

.btn-delete{background:#ef4444;color:white;}
.btn-block{background:orange;color:white;}
.btn-unblock{background:#22c55e;color:white;}

.btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}
</style>

</head>

<body>

<div class="admin-container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🍽 Admin Panel</h2>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="orders.html">📦 Orders</a>
    <a href="categories.html">📂 Categories</a>
    <a href="subcategories.html">📁 Subcategories</a>
    <a href="products.html">🍔 Products</a>
    <a href="users.html" class="active">👤 Users</a>
    <a href="#" onclick="logout(); return false;">🚪 Log out</a>
</div>

<!-- MAIN -->
<div class="main">

    <h1>User Management</h1>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="userTable"></tbody>
        </table>
    </div>

</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>


<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
    // ✅ ADMIN PROTECTION (အကောင့်စစ်ဆေးရန်)
    const admin = await requireAdmin();
    if (!admin) return;

    await loadUsers();
});

/* ================= LOAD USERS ================= */
async function loadUsers() {

    // CURRENT LOGIN USER
    const currentUser = await getUser();

    const { data, error } = await db
        .from("profiles")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    const table = document.getElementById("userTable");
    table.innerHTML = "";

    data.forEach((u, index) => {

        const status = u.status || "active";

        // ✅ CHECK SELF ACCOUNT
        const isSelf = currentUser?.id === u.id;

        table.innerHTML += `
        <tr>

            <td>${index + 1}</td>

            <td>${u.email}</td>

            <td>
                <span class="badge ${u.role}">
                    ${u.role}
                </span>
            </td>

            <td>
                <span class="badge ${status}">
                    ${status}
                </span>
            </td>

            <td>
                <div class="action-buttons">

                    <button
                        class="btn btn-block"
                        onclick="makeAdmin('${u.id}')"
                        ${isSelf ? "disabled" : ""}
                    >
                        Make Admin
                    </button>

                    <button
                        class="btn btn-unblock"
                        onclick="makeUser('${u.id}')"
                        ${isSelf ? "disabled" : ""}
                    >
                        Make User
                    </button>

                    <button
                        class="btn btn-delete"
                        onclick="deleteUser('${u.id}')"
                        ${isSelf ? "disabled" : ""}
                    >
                        Delete
                    </button>

                </div>

                ${
                  isSelf
                    ? `<div style="font-size:12px;color:gray;margin-top:5px;">
                        Current Account
                       </div>`
                    : ""
                }

            </td>

        </tr>
        `;
    });
}
/* ================= MAKE ADMIN ================= */
async function makeAdmin(id) {

    const { error } = await db
        .from("profiles")
        .update({ role: "admin" })
        .eq("id", id);

    if (error) {
        console.error(error);
        alert("Failed");
        return;
    }

    loadUsers();
}

/* ================= MAKE USER ================= */
async function makeUser(id) {

    const { error } = await db
        .from("profiles")
        .update({ role: "user" })
        .eq("id", id);

    if (error) {
        console.error(error);
        alert("Failed");
        return;
    }

    loadUsers();
}

/* ================= DELETE USER ================= */
async function deleteUser(id) {

  const ok = confirm(
    "Are you sure you want to delete this user?"
  );

  if (!ok) return;

  // prevent deleting yourself
  const currentUser = await getUser();

  if (currentUser?.id === id) {
    alert("You cannot delete your own admin account");
    return;
  }

  const { error } = await db
    .from("profiles")
    .delete()
    .eq("id", id);

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  alert("User deleted");

  loadUsers();
}
</script>


</body>
</html>
