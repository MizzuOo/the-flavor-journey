<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="../css/style.css">

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#f4f6f9;
}

.admin-container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#111827;
    color:white;
    padding:20px;
    position:fixed;
    height:100vh;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
    color:#4CAF50;
}

.sidebar a{
    display:block;
    color:white;
    padding:12px;
    margin:5px 0;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#4CAF50;
}

/* MAIN */
.main{
    margin-left:250px;
    flex:1;
    padding:20px;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.stat-card h3{
    margin:0;
    color:gray;
    font-size:14px;
}

.stat-card h1{
    margin-top:10px;
}

/* CARD */
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    text-align: left;
  padding: 12px 8px; /* Gives the data some breathing room */
  white-space: nowrap; /* Prevents text from wrapping awkwardly */
}

.status{
    padding:5px 10px;
    border-radius:20px;
    color:white;
    font-size:12px;
}

.pending{background:orange;}
.confirmed{background:#2196F3;}
.preparing{background:#9C27B0;}
.delivering{background:#FF9800;}
.completed{background:#4CAF50;}
.cancelled{background:red;}

@media (max-width: 768px){
    .admin-container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        position:relative;
    }

    .main{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="admin-container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🍽 Admin</h2>
    <a href="dashboard.html" class="active">📊 Dashboard</a>
    <a href="orders.html">📦 Orders</a>
    <a href="categories.html">📂 Categories</a>
    <a href="subcategories.html">📁 Subcategories</a>
    <a href="products.html">🍔 Products</a>
    <a href="users.html">👤 Users</a>
    <a href="#" onclick="logout(); return false;">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>Dashboard</h1>

<!-- STATS -->
<div class="stats-grid">

    <div class="stat-card">
        <h3>Total Orders</h3>
        <h1 id="totalOrders">0</h1>
    </div>

    <div class="stat-card">
        <h3>Total Revenue</h3>
        <h1 id="totalRevenue">0 MMK</h1>
    </div>

    <div class="stat-card">
        <h3>Pending</h3>
        <h1 id="pendingOrders">0</h1>
    </div>

    <div class="stat-card">
        <h3>Completed</h3>
        <h1 id="completedOrders">0</h1>
    </div>

    <div class="stat-card">
        <h3>Users</h3>
        <h1 id="totalUsers">0</h1>
    </div>

</div>

<!-- CHART -->
<div class="card">
    <h2>📊 Orders Analytics</h2>
    <canvas id="ordersChart"></canvas>
</div>

<div class="card">
    <h2>💰 Revenue (Last 7 Days)</h2>
    <canvas id="revenueChart"></canvas>
</div>

<!-- LATEST ORDERS -->
<div class="card">
    <h2>Latest Orders</h2>

    <table>
        <thead>
            <tr>
                <th>Customer</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="latestOrders"></tbody>
    </table>
</div>

</div>
</div>

<!-- NOTIFICATION -->
<div id="notification" class="notification"></div>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>

<script>
let ordersChart;
let revenueChart;

document.addEventListener("DOMContentLoaded", async () => {


  // ✅ ADMIN PROTECTION
  const admin = await requireAdmin();

  // BLOCK PAGE
  if (!admin) return;

  // LOAD DATA
  await loadDashboard();
  await loadRevenueChart();

  // REALTIME
  setupRealtime();

});


// ================= DASHBOARD =================
async function loadDashboard() {

  const [
    ordersRes,
    revenueRes,
    pendingRes,
    completedRes,
    usersRes,
    latestRes
  ] = await Promise.all([
    db.from("orders").select("*", { count: "exact", head: true }),
    db.from("orders").select("total").eq("status", "completed"),
    db.from("orders").select("*", { count: "exact", head: true }).eq("status", "pending"),
    db.from("orders").select("*", { count: "exact", head: true }).eq("status", "completed"),
    db.from("profiles").select("*", { count: "exact", head: true }),
    db.from("orders")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(5)
  ]);

  // ================= STATS =================
  document.getElementById("totalOrders").innerText = ordersRes.count || 0;

  const revenue = (revenueRes.data || [])
    .reduce((sum, o) => sum + Number(o.total), 0);

  document.getElementById("totalRevenue").innerText =
    revenue.toLocaleString() + " MMK";

  document.getElementById("pendingOrders").innerText = pendingRes.count || 0;
  document.getElementById("completedOrders").innerText = completedRes.count || 0;
  document.getElementById("totalUsers").innerText = usersRes.count || 0;

  // ================= TABLE =================
  const table = document.getElementById("latestOrders");
  table.innerHTML = "";

  (latestRes.data || []).forEach(o => {
    table.innerHTML += `
      <tr>
        <td>${o.customer_name || "-"}</td>
        <td>${Number(o.total).toLocaleString()} MMK</td>
        <td>${o.payment_method || "-"}</td>
        <td><span class="status ${o.status}">${o.status}</span></td>
      </tr>
    `;
  });

  loadChart();
}


// ================= ORDERS CHART =================
async function loadChart() {

  const { data: orders } = await db
    .from("orders")
    .select("status");

  const statusCount = {
    pending: 0,
    confirmed: 0,
    preparing: 0,
    delivering: 0,
    completed: 0,
    cancelled: 0
  };

  (orders || []).forEach(o => {
    if (statusCount[o.status] !== undefined) {
      statusCount[o.status]++;
    }
  });

  if (ordersChart) ordersChart.destroy();

  ordersChart = new Chart(document.getElementById("ordersChart"), {
    type: "bar",
    data: {
      labels: Object.keys(statusCount),
      datasets: [{
        label: "Orders",
        data: Object.values(statusCount)
      }]
    }
  });
}


// ================= REVENUE CHART (LAST 7 DAYS) =================
async function loadRevenueChart() {

  const { data: orders } = await db
    .from("orders")
    .select("total, created_at")
    .eq("status", "completed");

  const days = {};

  // last 7 days init
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);

    const key = d.toISOString().split("T")[0];
    days[key] = 0;
  }

  (orders || []).forEach(o => {
    const key = o.created_at?.split("T")[0];

    if (days[key] !== undefined) {
      days[key] += Number(o.total);
    }
  });

  if (revenueChart) revenueChart.destroy();

  revenueChart = new Chart(document.getElementById("revenueChart"), {
    type: "line",
    data: {
      labels: Object.keys(days),
      datasets: [{
        label: "Revenue (MMK)",
        data: Object.values(days),
        fill: true,
        tension: 0.3
      }]
    }
  });
}


// ================= REALTIME =================
function setupRealtime() {

  db.channel("dashboard-live")
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "orders"
    }, () => {

      loadDashboard();
      loadRevenueChart();

      showNotification("📦 New order update!");
    })
    .subscribe();
}


// ================= NOTIFICATION =================
function showNotification(msg) {
  const el = document.getElementById("notification");
  if (!el) return;

  el.innerText = msg;
  el.style.display = "block";

  setTimeout(() => {
    el.style.display = "none";
  }, 3000);
}
</script>

</body>
</html>
