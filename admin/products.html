<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Products</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f4f6f9;
}

.admin-container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#111827;
    color:white;
    padding:20px;
    position:fixed;
    top:0;
    left:0;
    height:100vh;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
    color:#4CAF50;
}

.sidebar a{
    display:block;
    color:white;
    padding:12px;
    margin:5px 0;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#4CAF50;
}

/* MAIN */
.main{
    margin-left:250px;
    flex:1;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn-add{
    background:#4CAF50;
    color:white;
}

.btn-edit{
    background:#2196F3;
    color:white;
}

.btn-delete{
    background:#ef4444;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
}

th{
    background:#f9f9f9;
}

img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:10px;
}

.search-box{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="admin-container">

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>🍽 Admin</h2>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="orders.html">📦 Orders</a>
    <a href="categories.html">📂 Categories</a>
    <a href="subcategories.html">📁 Subcategories</a>
    <a href="products.html" class="active">🍔 Products</a>
    <a href="users.html">👤 Users</a>
    <a href="#" onclick="logout(); return false;">🚪 Log out</a>

</div>

<!-- MAIN -->
<div class="main">

<h1>Products Management</h1>

<!-- ADD PRODUCT -->
<div class="card">

    <h3>Add Product</h3>

    <input type="text"
        id="name"
        placeholder="Product name">

    <input type="number"
        id="price"
        placeholder="Price">

    <input type="text"
        id="image"
        placeholder="Image URL">

    <select id="subcategory"></select>

    <button class="btn-add"
        onclick="addProduct()">
        Add Product
    </button>

</div>

<!-- PRODUCTS TABLE -->
<div class="card">

    <h3>Products List</h3>

    <input class="search-box"
        id="search"
        placeholder="Search products...">

    <table>

        <thead>
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Subcategory</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="table"></tbody>

    </table>

</div>

</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>


<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    // ✅ ADMIN PROTECTION (အကောင့်စစ်ဆေးရန်)
    const admin = await requireAdmin();
    if (!admin) return;

    await loadSubcategories();
    await loadProducts();
});

/* ================= LOAD SUBCATEGORIES ================= */
async function loadSubcategories() {

    const { data, error } = await db
        .from("subcategories")
        .select("id, name");

    if (error) {
        console.error(error);
        return;
    }

    const select = document.getElementById("subcategory");
    select.innerHTML = `<option value="">Select Subcategory</option>`;

    data.forEach(sc => {
        select.innerHTML += `
            <option value="${sc.id}">
                ${sc.name}
            </option>
        `;
    });
}

/* ================= ADD PRODUCT ================= */
async function addProduct() {

    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const image = document.getElementById("image").value;
    const subcategories_id = document.getElementById("subcategory").value;

    if (!name || !price || !subcategories_id) {
        alert("Please fill required fields");
        return;
    }

    const { error } = await db
        .from("products")
        .insert([{
            name,
            price,
            image_url: image,
            subcategories_id
        }]);

    if (error) {
        console.error(error);
        alert("Failed to add product");
        return;
    }

    alert("Product added successfully");

    clearForm();
    loadProducts();
}

/* ================= LOAD PRODUCTS ================= */
async function loadProducts() {

    const { data, error } = await db
        .from("products")
        .select(`
            id,
            name,
            price,
            image_url,
            subcategories (
                name
            )
        `)
        .order("id", { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(p => {

        table.innerHTML += `
        <tr>
            <td><img src="${p.image_url || ''}" /></td>
            <td>${p.name}</td>
            <td>${Number(p.price).toLocaleString()} MMK</td>
            <td>${p.subcategories?.name || "-"}</td>
            <td>
                <button class="btn-delete" onclick="deleteProduct(${p.id})">
                    Delete
                </button>
            </td>
        </tr>
        `;
    });
}

/* ================= DELETE PRODUCT ================= */
async function deleteProduct(id) {

    if (!confirm("Delete this product?")) return;

    const { error } = await db
        .from("products")
        .delete()
        .eq("id", id);

    if (error) {
        console.error(error);
        alert("Delete failed");
        return;
    }

    loadProducts();
}

/* ================= CLEAR FORM ================= */
function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";
    document.getElementById("subcategory").value = "";
}

/* ================= SEARCH ================= */
document.getElementById("search").addEventListener("input", async (e) => {

    const keyword = e.target.value.toLowerCase();

    const { data } = await db
        .from("products")
        .select(`
            id,
            name,
            price,
            image_url,
            subcategories (name)
        `);

    const filtered = data.filter(p =>
        p.name.toLowerCase().includes(keyword)
    );

    const table = document.getElementById("table");
    table.innerHTML = "";

    filtered.forEach(p => {
        table.innerHTML += `
        <tr>
            <td><img src="${p.image_url || ''}" /></td>
            <td>${p.name}</td>
            <td>${Number(p.price).toLocaleString()} MMK</td>
            <td>${p.subcategories?.name || "-"}</td>
            <td>
                <button class="btn-delete" onclick="deleteProduct(${p.id})">
                    Delete
                </button>
            </td>
        </tr>
        `;
    });
});
</script>

</body>
</html>
